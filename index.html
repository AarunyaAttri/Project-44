<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Platformer Adventure - A fun p5.js platformer game">
  <title>Platformer Adventure 🎮</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🕹️ Platformer Adventure</h1>

  <div class="game-wrapper">
    <div class="score-bar">
      <div class="score-item">
        <div class="label">Stars</div>
        <div class="value" id="starCount">0</div>
      </div>
      <div class="score-item">
        <div class="label">High Score</div>
        <div class="value" id="highScore">0</div>
      </div>
    </div>

    <div id="game-canvas"></div>

    <div class="controls">
      <div class="control-key">
        <span class="key">←</span><span class="key">→</span>
        <span>Move</span>
      </div>
      <div class="control-key">
        <span class="key">SPACE</span>
        <span>Jump</span>
      </div>
      <div class="control-key">
        <span class="key">R</span>
        <span>Restart</span>
      </div>
    </div>
  </div>

  <footer>Platformer Adventure — Make Your Own Game</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
